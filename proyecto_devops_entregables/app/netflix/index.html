<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>MiniFlix DevOps</title>
  <style>
    body { margin:0; background:#111; color:white; font-family:Arial, sans-serif; }
    header { padding:20px; background:#000; color:#e50914; font-size:32px; font-weight:bold; }
    .grid { display:flex; gap:20px; padding:30px; flex-wrap:wrap; }
    .card { background:#222; padding:15px; border-radius:12px; width:420px; }
    video { width:100%; border-radius:10px; }
  </style>
</head>
<body>
  <header>MiniFlix DevOps</header>
  <section class="grid">
    <div class="card">
      <h2>Video Demo 1</h2>
      <video controls src="videos/video1.mp4"></video>
    </div>
    <div class="card">
      <h2>Video Demo 2</h2>
      <video controls src="videos/video2.mp4"></video>
    </div>
  </section>
</body>
</html>
